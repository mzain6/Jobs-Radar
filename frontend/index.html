<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote Job Radar — Real-time Job Scanner</title>
  <meta name="description" content="Self-hosted job aggregator scanning We Work Remotely, Greenhouse, Lever, Indeed and LinkedIn for remote and on-site opportunities in the US, Canada, and Pakistan." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens ─────────────────────────────────────────────── */
    :root {
      --void:        #0B1018;
      --panel:       #131A24;
      --panel-raised:#1A2330;
      --hairline:    #232E3D;
      --ink:         #E7ECF2;
      --ink-dim:     #7E8CA0;
      --signal:      #FFB020;
      --echo:        #35D6C4;

      --mono:      'IBM Plex Mono', monospace;
      --sans:      'Inter', sans-serif;
      --display:   'Space Grotesk', sans-serif;

      --radius:    6px;
      --radius-lg: 10px;
      --transition: 0.18s ease;

      --src-linkedin:   #3B628B;
      --src-indeed:     #354C75;
      --src-greenhouse: #306B52;
      --src-lever:      #524175;
      --src-wwr:        #70593B;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--void);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Scrollbar ─────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--void); }
    ::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink-dim); }

    /* ── Utility ───────────────────────────────────────────────────── */
    .mono { font-family: var(--mono); }
    .muted { color: var(--ink-dim); }
    .signal { color: var(--signal); }
    .echo  { color: var(--echo); }

    /* ── Topbar ────────────────────────────────────────────────────── */
    #topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11, 16, 24, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--hairline);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      gap: 16px;
    }

    #topbar .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .radar-container {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--hairline);
      position: relative;
      overflow: hidden;
      background: var(--void);
      flex-shrink: 0;
    }
    
    .radar-sweep {
      position: absolute;
      top: -50%; left: -50%; right: -50%; bottom: -50%;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 70%, var(--signal) 100%);
      opacity: 0.15;
      animation: sweep-spin 4s linear infinite;
    }

    @keyframes sweep-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    #topbar .brand h1 {
      font-family: var(--display);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--ink);
      line-height: 1;
    }

    #job-counter-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .display-count {
      font-family: var(--display);
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: var(--ink);
    }
    .count-label {
      font-family: var(--sans);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink-dim);
      font-weight: 600;
      margin-top: 4px;
    }

    #topbar .right { display: flex; align-items: center; gap: 10px; }

    #btn-scan {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      background: var(--signal);
      color: #0F1419;
      border: none;
      border-radius: var(--radius);
      padding: 8px 20px;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #btn-scan:hover:not(:disabled) {
      background: #ffc233;
      transform: translateY(-1px);
    }
    #btn-scan:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }
    #btn-scan:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* ── Main layout ───────────────────────────────────────────────── */
    #app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 24px 60px;
    }

    /* ── Panel / card wrapper ──────────────────────────────────────── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      margin-bottom: 14px;
    }

    #panel-scan { border-left: 2px solid var(--signal); }
    #panel-filters { border-left: 2px solid var(--echo); }

    .panel-label {
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--ink-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* ── Form controls ─────────────────────────────────────────────── */
    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .field label {
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--ink-dim);
      text-transform: uppercase;
    }

    input[type="text"] {
      background: var(--void);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 13px;
      padding: 7px 12px;
      outline: none;
      transition: border-color var(--transition);
      width: 220px;
    }
    input[type="text"]:focus-visible {
      border-color: var(--signal);
    }
    input[type="text"]::placeholder { color: var(--ink-dim); opacity: 0.7; }

    /* ── Toggle button group ────────────────────────────────────────── */
    .toggle-group {
      display: flex;
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .toggle-group button {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
      background: var(--void);
      color: var(--ink-dim);
      border: none;
      border-right: 1px solid var(--hairline);
      padding: 7px 14px;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      white-space: nowrap;
    }
    .toggle-group button:last-child { border-right: none; }
    .toggle-group button:hover { background: var(--panel-raised); color: var(--ink); }
    .toggle-group button:focus-visible { outline: 2px solid var(--signal); outline-offset: -2px; z-index: 1; position: relative; }
    
    #toggle-work-mode button.active, #toggle-country button.active {
      background: var(--signal);
      color: var(--void);
      font-weight: 600;
    }
    
    #result-toggle-mode button.active, #result-toggle-country button.active {
      background: var(--echo);
      color: var(--void);
      font-weight: 600;
    }

    /* ── Scan status ────────────────────────────────────────────────── */
    #scan-status {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--signal);
      min-height: 20px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #scan-status.success { color: var(--echo); }
    #scan-status.error   { color: #FF5C5C; }

    /* ── Table section ──────────────────────────────────────────────── */
    #table-section {
      background: var(--panel);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    /* ── Scan Active Mode ───────────────────────────────────────────── */
    .scanning .radar-sweep {
      animation-duration: 1.5s;
      opacity: 1;
    }

    /* ── Reduced Motion ─────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .radar-sweep { animation: none !important; opacity: 1 !important; background: var(--signal) !important; transform: scale(0.4) !important; }
      .job-row.blip { animation: none !important; background-color: transparent !important; }
    }

    /* ── Table header ──────────────────────────────────────────────── */
    .table-header {
      display: grid;
      grid-template-columns: 110px 1fr 160px 160px 60px 100px 90px;
      gap: 0;
      padding: 11px 16px;
      border-bottom: 1px solid var(--hairline);
      background: var(--panel-raised);
    }
    .th {
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--ink-dim);
      text-transform: uppercase;
      user-select: none;
    }

    /* ── Table body ─────────────────────────────────────────────────── */
    #job-list { min-height: 200px; }

    .job-row {
      display: grid;
      grid-template-columns: 110px 1fr 160px 160px 60px 100px 90px;
      gap: 0;
      padding: 12px 16px;
      border-bottom: 1px solid var(--hairline);
      align-items: center;
      transition: background var(--transition);
      position: relative;
    }
    .job-row:last-child { border-bottom: none; }
    .job-row:hover { background: var(--panel-raised); }

    .job-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
    }
    .job-row.src-linkedin::before { background: var(--src-linkedin); }
    .job-row.src-indeed::before { background: var(--src-indeed); }
    .job-row.src-greenhouse::before { background: var(--src-greenhouse); }
    .job-row.src-lever::before { background: var(--src-lever); }
    .job-row.src-weworkremotely::before { background: var(--src-wwr); }

    .job-row.blip {
      animation: radar-blip 1.5s ease-out forwards;
    }
    @keyframes radar-blip {
      0% { background-color: rgba(53, 214, 196, 0.2); }
      100% { background-color: transparent; }
    }

    /* ── Cell styles ────────────────────────────────────────────────── */
    .cell { padding-right: 12px; overflow: hidden; }

    .source-tag {
      display: inline-block;
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-dim);
      text-transform: capitalize;
    }

    .job-title-link {
      color: var(--ink);
      text-decoration: none;
      font-weight: 500;
      font-size: 13px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color var(--transition);
    }
    .job-title-link:hover { color: var(--echo); text-decoration: underline; }

    .cell-company {
      font-size: 13px;
      color: var(--ink-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cell-location {
      font-family: var(--sans);
      font-size: 12px;
      color: var(--ink-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .country-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--panel-raised);
      color: var(--ink-dim);
      border: 1px solid var(--hairline);
    }

    .cell-date {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-dim);
      white-space: nowrap;
    }

    .remote-badge {
      display: inline-block;
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 3px;
      white-space: nowrap;
      background: rgba(53, 214, 196, 0.1); 
      color: var(--echo); 
      border: 1px solid rgba(53, 214, 196, 0.2);
    }
    .remote-no {
      background: rgba(126, 140, 160, 0.1);
      color: var(--ink-dim);
      border: 1px solid rgba(126, 140, 160, 0.2);
    }

    /* ── Empty state ─────────────────────────────────────────────────── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
      gap: 16px;
    }
    #empty-state h2 {
      font-family: var(--sans);
      font-size: 16px;
      color: var(--ink-dim);
      font-weight: 500;
    }
    #empty-state p {
      font-size: 13px;
      color: var(--ink-dim);
      max-width: 360px;
      opacity: 0.7;
    }

    /* ── Stats bar ───────────────────────────────────────────────────── */
    #stats-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat-chip {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-dim);
      background: var(--panel);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      padding: 4px 10px;
      white-space: nowrap;
    }
    .stat-chip span { color: var(--ink); font-weight: 600; }

    /* ── Pagination / load more ─────────────────────────────────────── */
    #load-more-wrap {
      padding: 16px;
      text-align: center;
      border-top: 1px solid var(--hairline);
      display: none;
    }
    #btn-load-more {
      font-family: var(--mono);
      font-size: 12px;
      background: transparent;
      color: var(--ink-dim);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      padding: 7px 20px;
      cursor: pointer;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
    }
    #btn-load-more:hover { background: var(--panel-raised); color: var(--ink); border-color: var(--ink-dim); }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #topbar { padding: 10px 14px; flex-wrap: wrap; }
      #app { padding: 12px 12px 40px; }

      .table-header { display: none; }

      .job-row {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        padding: 14px;
        border-radius: var(--radius);
        margin: 6px;
        background: var(--panel-raised);
        border: 1px solid var(--hairline);
      }
      .job-row::before { left: -1px; border-radius: var(--radius) 0 0 var(--radius); }

      input[type="text"] { width: 100%; }
      .control-row { flex-direction: column; align-items: stretch; }
      .field { width: 100%; }

      #topbar .brand h1 { font-size: 20px; }

      .job-title-link { -webkit-line-clamp: unset; }
    }
  </style>
</head>
<body>

<!-- ── Topbar ──────────────────────────────────────────────────────── -->
<header id="topbar">
  <div class="brand">
    <div class="radar-container"><div class="radar-sweep"></div></div>
    <h1>Remote Job <span class="signal">Radar</span></h1>
  </div>

  <div id="job-counter-wrap">
    <div id="total-count" class="display-count">—</div>
    <div class="count-label">TOTAL JOBS</div>
  </div>

  <div class="right">
    <button id="btn-scan" onclick="triggerScan()">
      <span id="scan-btn-icon">◎</span> SCAN
    </button>
  </div>
</header>

<main id="app">

  <!-- ── Scrape controls ───────────────────────────────────────────── -->
  <div class="panel" id="panel-scan">
    <div class="panel-label">⟩ Scan Parameters</div>
    <div class="control-row">



      <div class="field">
        <label>Work Mode</label>
        <div class="toggle-group" id="toggle-work-mode" role="group" aria-label="Work Mode">
          <button id="wm-remote"  class="active"  onclick="setWorkMode('remote')">Remote</button>
          <button id="wm-onsite"                  onclick="setWorkMode('onsite')">On-site</button>
          <button id="wm-both"                    onclick="setWorkMode('both')">Both</button>
        </div>
      </div>

      <div class="field">
        <label>Country</label>
        <div class="toggle-group" id="toggle-country" role="group" aria-label="Country">
          <button id="ct-US"  onclick="setCountry('US')">US</button>
          <button id="ct-CA"  onclick="setCountry('CA')">CA</button>
          <button id="ct-PK"  onclick="setCountry('PK')">PK</button>
          <button id="ct-all" class="active" onclick="setCountry('all')">All</button>
        </div>
      </div>

      <div class="field">
        <label for="input-location">Location (optional)</label>
        <input type="text" id="input-location" placeholder="e.g. Austin, TX" />
      </div>

    </div>

    <div id="scan-status"></div>
  </div>

  <!-- ── Stats ─────────────────────────────────────────────────────── -->
  <div id="stats-bar"></div>

  <!-- ── Result Filters ────────────────────────────────────────────── -->
  <div class="panel" id="panel-filters" style="margin-bottom: 14px; padding: 12px 16px;">
    <div class="panel-label" style="margin-bottom: 8px;">⟩ Result Filters</div>
    <div class="control-row" style="display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; justify-content: space-between; width: 100%;">
      <div style="display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end;">
        <div class="field">
          <label>Country</label>
          <div class="toggle-group" id="result-toggle-country" role="group" aria-label="Result Country">
            <button id="rf-ct-all" class="active" onclick="setResultCountry('all')">All</button>
            <button id="rf-ct-US" onclick="setResultCountry('US')">US</button>
            <button id="rf-ct-CA" onclick="setResultCountry('CA')">CA</button>
            <button id="rf-ct-PK" onclick="setResultCountry('PK')">PK</button>
          </div>
        </div>

        <div class="field">
          <label>Work Mode</label>
          <div class="toggle-group" id="result-toggle-mode" role="group" aria-label="Result Work Mode">
            <button id="rf-wm-both" class="active" onclick="setResultWorkMode('both')">Both</button>
            <button id="rf-wm-remote" onclick="setResultWorkMode('remote')">Remote</button>
            <button id="rf-wm-onsite" onclick="setResultWorkMode('onsite')">On-site</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="result-input-search">Quick Search</label>
        <input type="text" id="result-input-search" placeholder="Search title, company, location..." style="width: 280px;" />
      </div>
    </div>
  </div>

  <!-- ── Table ─────────────────────────────────────────────────────── -->
  <div id="table-section">
    <div id="table-header-wrap">
      <div class="scan-line" id="scan-line"></div>
      <div class="table-header">
        <div class="th">Source</div>
        <div class="th">Job Title</div>
        <div class="th">Company</div>
        <div class="th">Location</div>
        <div class="th">Country</div>
        <div class="th">Posted</div>
        <div class="th">Mode</div>
      </div>
    </div>

    <div id="job-list">
      <!-- Jobs rendered here -->
    </div>

    <div id="load-more-wrap">
      <button id="btn-load-more" onclick="loadMore()">Load more ↓</button>
    </div>
  </div>

</main>

<script>
/* ─── State ──────────────────────────────────────────────────────────── */
let workMode  = 'remote';
let country   = 'all';
let allJobs   = [];
let filteredJobs = [];
let displayed = 0;
const PAGE    = 50;
let isScanning = false;

let seenJobs = JSON.parse(localStorage.getItem('seenJobs') || '[]');
if (seenJobs.length > 5000) seenJobs = seenJobs.slice(-5000);
let seenSet = new Set(seenJobs);

// Result filters state
let resultCountry = 'all';
let resultWorkMode = 'both';
let resultSearchText = '';

/* ─── Location placeholder logic ────────────────────────────────────── */
const locationPlaceholders = {
  US:  'e.g. Austin, TX',
  CA:  'e.g. Toronto, ON',
  PK:  'Lahore, Pakistan',
  all: 'e.g. Austin, TX',
};

function setWorkMode(mode) {
  workMode = mode;
  ['remote', 'onsite', 'both'].forEach(m => {
    document.getElementById('wm-' + m).className = (m === mode) ? 'active' : '';
  });
  showActiveFilters();
}

function setCountry(c) {
  country = c;
  ['US', 'CA', 'PK', 'all'].forEach(cc => {
    const btn = document.getElementById('ct-' + cc);
    btn.className = (cc === c) ? (c === 'CA' ? 'active-teal' : 'active') : '';
  });
  // Update location placeholder
  const locInput = document.getElementById('input-location');
  if (c === 'PK' && !locInput.value) {
    locInput.placeholder = 'Lahore, Pakistan (default)';
  } else {
    locInput.placeholder = locationPlaceholders[c] || 'e.g. city, region';
  }
  showActiveFilters();
}

/* ─── Result Filtering Logic ─────────────────────────────────────────── */
function setResultCountry(c) {
  resultCountry = c;
  ['all', 'US', 'CA', 'PK'].forEach(cc => {
    const btn = document.getElementById('rf-ct-' + cc);
    if (btn) {
      btn.className = (cc === c) ? (c === 'CA' ? 'active-teal' : 'active') : '';
    }
  });
  applyResultFilters();
}

function setResultWorkMode(mode) {
  resultWorkMode = mode;
  ['both', 'remote', 'onsite'].forEach(m => {
    const btn = document.getElementById('rf-wm-' + m);
    if (btn) {
      btn.className = (m === mode) ? 'active' : '';
    }
  });
  applyResultFilters();
}

function applyResultFilters() {
  const query = resultSearchText.toLowerCase().trim();
  
  filteredJobs = allJobs.filter(job => {
    // Country filter
    if (resultCountry !== 'all') {
      if (job.country !== resultCountry) return false;
    }
    
    // Work mode filter
    if (resultWorkMode === 'remote' && !job.remote) return false;
    if (resultWorkMode === 'onsite' && job.remote) return false;
    
    // Quick search text filter
    if (query) {
      const title = (job.title || '').toLowerCase();
      const company = (job.company || '').toLowerCase();
      const loc = (job.location || '').toLowerCase();
      if (!title.includes(query) && !company.includes(query) && !loc.includes(query)) {
        return false;
      }
    }
    
    return true;
  });

  displayed = 0;
  renderJobs(true);
  updateCounter(filteredJobs.length);
}

/* ─── Scan ───────────────────────────────────────────────────────────── */
async function triggerScan() {
  if (isScanning) return;
  isScanning = true;

  const btn  = document.getElementById('btn-scan');
  const icon = document.getElementById('scan-btn-icon');
  const status = document.getElementById('scan-status');
  const tableWrap = document.getElementById('table-header-wrap');

  btn.disabled = true;
  icon.innerHTML = '<span class="spin-icon">◌</span>';
  tableWrap.classList.add('scanning');
  status.className = '';
  status.innerHTML = '<span class="spin-icon">◌</span> Scan triggered! Scraping is running in the background...';

  const body = {
    work_mode: workMode,
    country:   country,
    location:  document.getElementById('input-location').value.trim() || null,
  };

  try {
    const res  = await fetch('/api/scrape?async=true', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });
    const data = await res.json();

    if (!res.ok) throw new Error(data.detail || 'Scan request failed');

    status.className = '';
    status.innerHTML = `<span class="spin-icon">◌</span> Scanning sources — this may take 15–20 seconds…`;

    // Wait 10 seconds before first poll to ensure the background task has had time to start
    await new Promise(resolve => setTimeout(resolve, 10000));

    // Poll the backend status every 15 seconds to check if it's still scraping
    const pollInterval = setInterval(async () => {
      try {
        const statusRes = await fetch('/api/scrape/status');
        const statusData = await statusRes.json();

        if (!statusData.is_scraping) {
          clearInterval(pollInterval);

          // Fetch all newly scraped jobs combined once at the end, showing skeletons
          await loadJobs(true);
          await loadStats();

          status.className = 'success';
          status.innerHTML = `✓ Scan complete! Fresh jobs loaded.`;

          btn.disabled = false;
          icon.textContent = '◎';
          tableWrap.classList.remove('scanning');
          isScanning = false;
        }
      } catch (pollErr) {
        console.error('Polling error:', pollErr);
      }
    }, 15000);

  } catch (err) {
    status.className = 'error';
    status.innerHTML = `✗ Error: ${err.message}`;
    btn.disabled = false;
    icon.textContent = '◎';
    tableWrap.classList.remove('scanning');
    isScanning = false;
  }
}

/* ─── Active filter badge ─────────────────────────────────────────────── */
function showActiveFilters() {
  const status = document.getElementById('scan-status');
  if (status.className === 'success' || status.className === 'error') return; // don't overwrite scan result
  const parts = [];
  if (country !== 'all') parts.push(`Country: ${country}`);
  if (workMode !== 'both') parts.push(`Mode: ${workMode}`);
  const loc = document.getElementById('input-location').value.trim();
  if (loc) parts.push(`Location: "${loc}"`);
  if (parts.length) {
    status.className = '';
    status.innerHTML = `⟩ Scan configuration — ${parts.join('  ·  ')}`;
  } else {
    status.innerHTML = '';
  }
}

/* ─── Load jobs ──────────────────────────────────────────────────────── */
async function loadJobs(showSkeleton = false) {
  if (showSkeleton) {
    showSkeletons();
  }
  showActiveFilters();
  try {
    const res  = await fetch('/api/jobs?limit=1000');
    const data = await res.json();
    allJobs   = data.jobs || [];
    applyResultFilters();
  } catch (err) {
    showError('Failed to load jobs: ' + err.message);
  }
}

/* ─── Render ──────────────────────────────────────────────────────────── */
function renderJobs(fresh = false) {
  const list = document.getElementById('job-list');
  if (fresh) list.innerHTML = '';

  if (filteredJobs.length === 0) {
    list.innerHTML = '';
    showEmptyState();
    document.getElementById('load-more-wrap').style.display = 'none';
    return;
  }

  const slice = filteredJobs.slice(displayed, displayed + PAGE);
  displayed += slice.length;

  let hasNew = false;
  slice.forEach(job => {
    let isNew = false;
    if (!seenSet.has(job.url)) {
      isNew = true;
      hasNew = true;
      seenSet.add(job.url);
      seenJobs.push(job.url);
    }

    const row = document.createElement('div');
    row.className = `job-row src-${sanitize(job.source)} ${isNew ? 'blip' : ''}`;
    row.innerHTML = `
      <div class="cell">
        <span class="source-tag">${sanitize(job.source)}</span>
      </div>
      <div class="cell">
        <a class="job-title-link" href="${sanitize(job.url)}" target="_blank" rel="noopener noreferrer">
          ${sanitize(job.title)}
        </a>
      </div>
      <div class="cell cell-company">${sanitize(job.company)}</div>
      <div class="cell cell-location">${sanitize(job.location)}</div>
      <div class="cell">
        <span class="country-badge badge-${sanitize(job.country)}">${sanitize(job.country) || '—'}</span>
      </div>
      <div class="cell cell-date">${formatDate(job.posted_date)}</div>
      <div class="cell">
        <span class="remote-badge ${job.remote ? 'remote-yes' : 'remote-no'}">
          ${job.remote ? 'Remote' : 'On-site'}
        </span>
      </div>
    `;
    list.appendChild(row);
  });

  if (hasNew) {
    if (seenJobs.length > 5000) seenJobs = seenJobs.slice(-5000);
    localStorage.setItem('seenJobs', JSON.stringify(seenJobs));
  }

  const lmw = document.getElementById('load-more-wrap');
  lmw.style.display = displayed < filteredJobs.length ? 'block' : 'none';
}

function loadMore() { renderJobs(false); }

function showEmptyState() {
  document.getElementById('job-list').innerHTML = `
    <div id="empty-state">
      <h2>No signals detected</h2>
      <p>No jobs match your current filters. Run a scan to pull fresh listings from all sources.</p>
    </div>
  `;
}

function showSkeletons() {
  const list = document.getElementById('job-list');
  list.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    list.innerHTML += `
      <div class="skeleton-row">
        <div class="skeleton-cell" style="width:80%;height:14px"></div>
        <div class="skeleton-cell" style="width:90%;height:14px"></div>
        <div class="skeleton-cell" style="width:70%;height:14px"></div>
        <div class="skeleton-cell" style="width:75%;height:14px"></div>
        <div class="skeleton-cell" style="width:40%;height:14px"></div>
        <div class="skeleton-cell" style="width:60%;height:14px"></div>
        <div class="skeleton-cell" style="width:55%;height:14px"></div>
      </div>
    `;
  }
}

function showError(msg) {
  document.getElementById('job-list').innerHTML = `
    <div style="padding:40px;text-align:center;color:var(--red);font-family:var(--mono);font-size:13px;">
      ✗ ${sanitize(msg)}
    </div>
  `;
}

/* ─── Stats ──────────────────────────────────────────────────────────── */
async function loadStats() {
  try {
    const res  = await fetch('/api/stats');
    const data = await res.json();
    const bar  = document.getElementById('stats-bar');
    const byC  = (data.by_country || []).map(r => `${r.country || '?'} <span>${r.n}</span>`).join(' · ');
    const byS  = (data.by_source  || []).map(r => `${r.source} <span>${r.n}</span>`).join(' · ');
    bar.innerHTML = `
      <div class="stat-chip">Total <span>${data.total || 0}</span></div>
      ${byC ? `<div class="stat-chip">${byC}</div>` : ''}
      ${byS ? `<div class="stat-chip">${byS}</div>` : ''}
    `;
  } catch (_) {}
}

function updateCounter(n) {
  document.getElementById('total-count').textContent = n ?? '—';
}

/* ─── Helpers ────────────────────────────────────────────────────────── */
function sanitize(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatDate(raw) {
  if (!raw) return '—';
  try {
    const d = new Date(raw);
    if (isNaN(d)) return raw.slice(0, 10);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
  } catch (_) {
    return raw.slice(0, 10);
  }
}

/* ─── Init ───────────────────────────────────────────────────────────── */
(async function init() {
  // Set initial country state without triggering loadJobs (we call it below)
  country = 'all';
  ['US', 'CA', 'PK', 'all'].forEach(cc => {
    const btn = document.getElementById('ct-' + cc);
    btn.className = (cc === 'all') ? 'active' : '';
  });

  // Listener for Scan location changes to update configuration text
  document.getElementById('input-location').addEventListener('input', () => {
    showActiveFilters();
  });

  // Debounced local search text input
  let searchTimer = null;
  document.getElementById('result-input-search').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      resultSearchText = e.target.value;
      applyResultFilters();
    }, 300);
  });

  // Initial load showing skeletons
  await Promise.all([loadJobs(true), loadStats()]);

  // ── Smart auto-refresh: poll every 1 hour for new jobs ─────────────
  let lastKnownTotal = allJobs.length;

  setInterval(async () => {
    if (isScanning) return;
    try {
      const res  = await fetch('/api/stats');
      const data = await res.json();
      const newTotal = data.total || 0;
      if (newTotal > lastKnownTotal) {
        const diff = newTotal - lastKnownTotal;
        lastKnownTotal = newTotal;
        await Promise.all([loadJobs(false), loadStats()]);
        const status = document.getElementById('scan-status');
        if (status.className !== 'error') {
          status.className = 'success';
          status.innerHTML = `✓ ${diff} new job(s) added by scheduled scan. Dashboard updated.`;
          setTimeout(() => { if (status.className === 'success') status.innerHTML = ''; }, 6000);
        }
      }
    } catch (_) {}
  }, 60 * 60 * 1000); // every 1 hour
})();
</script>
